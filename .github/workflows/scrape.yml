name: Scrape Hillsborough Leads

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 5:00 AM ET (accounts for UTC-5 EST / UTC-4 EDT)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright dbfread

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: 7
        run: python scraper/fetch.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          force_orphan: false
