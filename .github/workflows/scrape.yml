name: Scrape Hillsborough Leads

on:
  schedule:
    - cron: "0 7 * * *"   # 7 AM UTC = 3 AM EST daily
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: mkdir -p data dashboard

      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python scraper/debug_both.py

      - name: Copy records to dashboard
        run: cp data/records.json dashboard/records.json || true

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/records.json || true
          git diff --staged --quiet || git commit -m "update leads $(date -u '+%Y-%m-%d')"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
