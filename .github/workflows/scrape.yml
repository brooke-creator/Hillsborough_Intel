name: Scrape Hillsborough Leads

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 5:00 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml playwright dbfread

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: 7
          FOREWARN_EMAIL: ${{ secrets.FOREWARN_EMAIL }}
          FOREWARN_PASSWORD: ${{ secrets.FOREWARN_PASSWORD }}
        run: python scraper/fetch.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
